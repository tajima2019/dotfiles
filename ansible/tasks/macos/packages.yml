# Tap(リポジトリ)の追加
- name: Add Homebrew Taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop:
    - FelixKratz/formulae
    - xwmx/taps

- name: UpdateHomebrew
  community.general.homebrew:
    update_homebrew: yes

# CUIのインストール
- name: Install Homebrew Packages
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - pngpaste
    - navi
    - fzf
    - cmatrix
    - cava
    - fastfetch
    - figlet
    - lolcat
    - tty-clock
    - yazi
    - ffmpegthumbnailer
    - unar
    - jq
    - poppler
    - fd
    - ripgrep
    - zoxide
    - sketchybar
    - lua
    - switchaudio-osx
    - nowplaying-cli
    - pnpm
    - lazydocker
    - lazygit
    - gh
    - sheldon
    - nb
    - node
    - nvim
    - bat
    - delta
    - thefuck
    - eza

# Caskのインストール
- name: Install Homebrew Casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop:
    - ghostty
    - raycast
    - nikitabobko/tap/aerospace
    - alt-tab
    - zen
    # 手動で入れる必要ありかも
    - sf-symbols
    - font-hack-nerd-font
    - font-sf-pro
    - font-sf-mono

- name: Install global npm packages
  community.general.npm:
    name: "{{ item }}"
    global: yes
    state: latest
  loop:
    - tree-sitter-cli
    - "@openai/codex"
  become: true
