- hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: Run Common tasks
      include_tasks: tasks/common/common.yml

    - name: Run Arch Linux tasks
      include_tasks: tasks/arch/arch.yml
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Run macOS tasks
      include_tasks: tasks/macos/macos.yml
      when: ansible_facts['os_family'] == "Darwin"
